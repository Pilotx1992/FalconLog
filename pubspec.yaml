name: falconlog
description: "FalconLog"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  uuid: ^4.2.2
  fl_chart: ^1.0.0
  flutter_feather_icons: ^2.0.0+1
  flutter_svg: ^2.0.10
  flutter_riverpod: ^2.6.1
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  local_auth: ^2.1.8
  local_auth_android: ^1.0.35
  # Downgraded to v6 API for compatibility with existing sign-in code. Upgrade to 7.x requires migration.
  google_sign_in: ^6.2.1
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  http: ^1.1.0
  encrypt: ^5.0.3
  connectivity_plus: ^6.0.5
  path_provider: ^2.1.5
  url_launcher: ^6.3.0
  archive: ^4.0.7
  crypto: ^3.0.6
  flutter_secure_storage: ^9.2.2
  path: ^1.9.1
  workmanager: ^0.9.0+2
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/airplane.svg
    - assets/airplane.png
    - assets/google.png